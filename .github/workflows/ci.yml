name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    name: check (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            smoke: xvfb-run -a pnpm smoke:electron
          - os: macos-latest
            smoke: pnpm smoke:electron
          - os: windows-latest
            smoke: pnpm smoke:electron
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    env:
      CI: true
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version-file: .node-version
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - name: Configure Electron sandbox helper
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          sandbox_path="$(dirname "$(node -p "require('electron')")")/chrome-sandbox"
          sudo chown root "$sandbox_path"
          sudo chmod 4755 "$sandbox_path"
      - run: ${{ matrix.smoke }}
